# ============================================
# PRISM — Docker Compose (Self-Hosted Stack)
# ============================================
# Usage: docker compose up -d
# ============================================

services:
  # ── PRISM Backend ──
  prism:
    build: ./backend
    container_name: prism-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - prism_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    volumes:
      - prism_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: prism-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prism_pgdata:
    driver: local
  prism_data:
    driver: local
