name: Deploy Frontend to Oracle Cloud

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Static Export
        working-directory: frontend
        run: npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Oracle
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no ubuntu@$HOST"

          # Create frontend directory on remote if it doesn't exist
          $SSH_CMD "mkdir -p ~/frontend"

          # Upload frontend build via scp (sync out folder)
          # Use rsync to mirror the out folder over SSH
          rsync -avz -e "ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no" --delete frontend/out/ ubuntu@$HOST:~/frontend/out/

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/oracle_key
